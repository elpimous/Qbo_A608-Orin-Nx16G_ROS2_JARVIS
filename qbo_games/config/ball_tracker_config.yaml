# =======================================================================================================
# Configuration — Neo Ball Tracker
# Date : 2025
# =======================================================================================================

qbo_ball_tracker_node:
  ros__parameters:

    # --- Topics ---
    input_image_topic: "/inverted_eye_image"
    output_roi_topic:  "/target_roi"
    debug_image_topic: "/ball_tracker_debug"

    # --- Masque HSV rouge ---
    # Le rouge en HSV est scindé en deux plages : autour de 0° et de 180°
    # Ajuster S et V selon les conditions lumineuses du lieu
    hsv:
      # Plage basse (rouge orangé → rouge pur)
      low1:  [0,   120,  70]   # [H_min, S_min, V_min]
      high1: [10,  255, 255]   # [H_max, S_max, V_max]

      # Plage haute (rouge magenta → rouge pur côté 180°)
      low2:  [170, 120,  70]
      high2: [180, 255, 255]

    # --- Filtres de taille (en pixels, image originale) ---
    detection:
      min_radius_px:   8    # Ignorer les taches < 8px de rayon (bruit)
      max_radius_px: 300    # Ignorer les objets trop grands (fond rouge, etc.)

    # --- Performance Jetson Orin NX ---
    perf:
      scale_factor:   0.5   # Traitement à 50% de la résolution → ~4x plus rapide
                            # Passer à 0.25 pour un gain CPU supplémentaire si besoin
      publish_debug: true   # false en production pour économiser la bande ROS2

    # --- Morphologie ---
    morph:
      kernel_size: 5        # Taille du noyau elliptique pour OPEN/CLOSE
                            # Augmenter si la balle a des trous dans le masque
